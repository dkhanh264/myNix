[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#222222"
foreground = "#F8F8F2"

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.bold]
family = "JetBrainsMono Nerd Font Mono"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[font.offset]
y = -4

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[window]
decorations = "None"
opacity = 0.4

[window.padding]
x = 14
y = 14
